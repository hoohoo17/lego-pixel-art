<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>레고 픽셀아트 변환기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f8f6f1;--surface:#fff;--surface2:#f2efe8;
  --border:#e0dbd0;--border2:#ccc8bc;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#d3be2f;--accent-dark:#a08a10;
  --warm:#b6713f;--radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;}
.logo-brick{width:32px;height:20px;background:#d3be2f;border-radius:3px;position:relative;display:flex;align-items:center;justify-content:center;}
.logo-brick::after{content:'';width:10px;height:10px;background:#e8d44a;border-radius:50%;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.2);}
.header-sub{font-size:12px;color:var(--text3);letter-spacing:1px;}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:32px 24px;}
.layout{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
@media(max-width:800px){.layout{grid-template-columns:1fr;}}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.panel-title{font-size:11px;letter-spacing:2px;color:var(--text3);margin-bottom:16px;text-transform:uppercase;}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface2);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#fdfbee;}
.upload-icon{width:40px;height:40px;margin:0 auto 12px;opacity:0.4;}
.upload-text{font-size:14px;color:var(--text2);margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--text3);}
.thumb{width:100%;aspect-ratio:1;object-fit:contain;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);display:none;}

/* CONTROLS */
.ctrl-row{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.ctrl-item{display:flex;flex-direction:column;gap:6px;}
.ctrl-label{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;}
.ctrl-label span{color:var(--text);font-weight:500;}
select,input[type=range]{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;}
select:focus{border-color:var(--accent);}
input[type=range]{padding:0;height:4px;accent-color:var(--accent);}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn{flex:1;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all 0.12s;}
.btn:hover{background:var(--surface2);}
.btn.primary{background:var(--accent);border-color:var(--accent-dark);color:#111;}
.btn.primary:hover{background:#c4af28;}

/* PREVIEW TABS */
.tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.tab{flex:1;padding:8px;font-size:12px;text-align:center;cursor:pointer;border:none;background:var(--surface2);color:var(--text2);transition:all 0.12s;}
.tab.active{background:var(--surface);color:var(--text);font-weight:500;}

/* CANVAS */
.canvas-area{background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:400px;overflow:auto;}
.canvas-area canvas{image-rendering:pixelated;max-width:100%;}
.empty-state{text-align:center;color:var(--text3);font-size:13px;padding:60px 20px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.stat{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;text-align:center;}
.stat-v{font-size:20px;font-weight:600;color:var(--text);}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.5px;}

/* PALETTE */
.palette-section{margin-bottom:20px;}
.swatches{display:flex;gap:4px;flex-wrap:wrap;}
.swatch{width:28px;height:28px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);position:relative;cursor:default;}
.swatch-tip{display:none;position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:10px;padding:3px 6px;border-radius:3px;white-space:nowrap;z-index:10;}
.swatch:hover .swatch-tip{display:block;}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);letter-spacing:0.5px;}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
td:first-child{width:32px;}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;}
.badge-warm{background:#b6713f22;color:#8a4a20;}
.badge-neutral{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;margin:1px;}
.tag-660{background:#d3be2f;color:#111;}
.tag-330{background:#a08a10;color:#fff;}
.tag-200{background:#777;color:#fff;}
td.num{text-align:right;}
td.w{color:var(--text3);}

/* SECTION DIVIDER */
.divider{font-size:11px;letter-spacing:2px;color:var(--text3);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-brick"></div>
    레고 픽셀아트 변환기
  </div>
  <div class="header-sub">LEGO PIXEL ART CONVERTER</div>
</header>

<div class="container">
  <div class="layout">

    <!-- LEFT: 컨트롤 -->
    <div>
      <div class="panel">
        <div class="panel-title">이미지 업로드</div>
        <div class="upload-zone" id="drop-zone">
          <svg class="upload-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="10" width="32" height="24" rx="3" stroke="#999" stroke-width="1.5"/>
            <path d="M4 26l9-8 7 6 5-4 11 10" stroke="#999" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="28" cy="18" r="3" stroke="#999" stroke-width="1.5"/>
          </svg>
          <div class="upload-text">이미지를 드래그하거나 클릭</div>
          <div class="upload-sub">JPG · PNG · WEBP</div>
          <input type="file" id="file-input" accept="image/*" style="display:none">
        </div>
        <img id="thumb" class="thumb" alt="미리보기">

        <div class="ctrl-row">
          <div class="ctrl-item">
            <div class="ctrl-label">해상도 <span id="res-label">32×32</span></div>
            <select id="res-select">
              <option value="16">16×16 (256블럭)</option>
              <option value="24">24×24 (576블럭)</option>
              <option value="32" selected>32×32 (1,024블럭)</option>
              <option value="48">48×48 (2,304블럭)</option>
              <option value="64">64×64 (4,096블럭)</option>
            </select>
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">밝기 <span id="br-label">115%</span></div>
            <input type="range" id="brightness" min="70" max="160" value="115" step="1">
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">채도 <span id="sat-label">140%</span></div>
            <input type="range" id="saturation" min="70" max="220" value="140" step="1">
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">소량 통합 기준 <span id="merge-label">10개</span></div>
            <input type="range" id="merge-thresh" min="0" max="30" value="10" step="1">
          </div>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="convert-btn">변환</button>
          <button class="btn" id="dl-pixel-btn">픽셀아트</button>
          <button class="btn" id="dl-manual-btn">설명서</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: 결과 -->
    <div>
      <div id="empty-panel" class="panel">
        <div class="empty-state">
          이미지를 업로드하면 레고 픽셀아트로 변환합니다
        </div>
      </div>

      <div id="result-panel" style="display:none;">
        <!-- STATS -->
        <div class="stats" id="stats"></div>

        <!-- PREVIEW -->
        <div class="panel" style="margin-bottom:16px;">
          <div class="tabs">
            <button class="tab active" data-tab="pixel">레고 픽셀아트</button>
            <button class="tab" data-tab="manual">조립 설명서</button>
            <button class="tab" data-tab="orig">원본</button>
          </div>
          <div class="canvas-area" id="canvas-area">
            <canvas id="pixel-canvas"></canvas>
            <canvas id="manual-canvas" style="display:none;"></canvas>
            <canvas id="orig-canvas" style="display:none;"></canvas>
          </div>
        </div>

        <!-- PALETTE & PURCHASE -->
        <div class="panel">
          <div class="panel-title">팔레트</div>
          <div class="swatches" id="swatches"></div>

          <div class="divider">구매 목록 (200 / 330 / 660 단위)</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th></th><th>번호</th><th>구분</th>
                  <th style="text-align:right">사용</th>
                  <th>구매 구성</th>
                  <th style="text-align:right">합계</th>
                  <th style="text-align:right">낭비</th>
                </tr>
              </thead>
              <tbody id="purchase-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const PALETTE = {
  '1':   {hex:'#cdd0ad',warm:true},
  '18':  {hex:'#b6713f',warm:true},
  '283': {hex:'#b7947e',warm:true},
  '192': {hex:'#53352a',warm:true},
  '330': {hex:'#746239',warm:true},
  '312': {hex:'#967541',warm:true},
  '220': {hex:'#d56066',warm:true},
  '226': {hex:'#d3be2f',warm:true},
  '148': {hex:'#333736',warm:false},
  '194': {hex:'#7b8987',warm:false},
  '26':  {hex:'#303336',warm:false},
};

const REMAP = {
  '141':'192','154':'26','324':'194','179':'194',
  '138':'330','308':'26','21':'220','199':'194','325':'330','222':'220','A25':'330'
};

const PAL_LABELS = Object.keys(PALETTE);
const PAL_HEXES  = PAL_LABELS.map(l=>PALETTE[l].hex);
const PAL_RGBS   = PAL_HEXES.map(h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]);

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function brightness(h){const[r,g,b]=hexToRgb(h);return 0.299*r+0.587*g+0.114*b;}

function nearestLabel(r,g,b){
  let best=0,bestD=1e18;
  for(let i=0;i<PAL_RGBS.length;i++){
    const[pr,pg,pb]=PAL_RGBS[i];
    const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
    if(d<bestD){bestD=d;best=i;}
  }
  return PAL_LABELS[best];
}

function bestPurchase(n){
  let cost=Infinity,combo=[0,0,0];
  for(let a=0;a<=Math.floor(n/660)+1;a++)
    for(let b=0;b<=Math.floor((n-a*660)/330)+1;b++)
      for(let c=0;c<=Math.floor((n-a*660-b*330)/200)+1;c++){
        const t=a*660+b*330+c*200;
        if(t>=n&&t<cost){cost=t;combo=[c,b,a];}
      }
  return{buy:cost,combo};
}

let origImg=null,lastGrid=null;

// ── Sliders ──
['brightness','saturation','merge-thresh'].forEach(id=>{
  const el=document.getElementById(id);
  const lbl=document.getElementById(id==='brightness'?'br-label':id==='saturation'?'sat-label':'merge-label');
  el.oninput=()=>{lbl.textContent=el.value+(id==='merge-thresh'?'개':'%');};
});
document.getElementById('res-select').onchange=function(){
  document.getElementById('res-label').textContent=this.value+'×'+this.value;
};

// ── Upload ──
const dropZone=document.getElementById('drop-zone');
const fileInput=document.getElementById('file-input');
dropZone.onclick=()=>fileInput.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add('drag');};
dropZone.ondragleave=()=>dropZone.classList.remove('drag');
dropZone.ondrop=e=>{e.preventDefault();dropZone.classList.remove('drag');loadFile(e.dataTransfer.files[0]);};
fileInput.onchange=e=>loadFile(e.target.files[0]);

function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    origImg=img;
    const thumb=document.getElementById('thumb');
    thumb.src=url;thumb.style.display='block';
    dropZone.style.display='none';
    convert();
  };
  img.src=url;
}

// ── Convert ──
document.getElementById('convert-btn').onclick=convert;

function adjustPixel(r,g,b,bri,sat){
  const br=bri/100;
  r=Math.min(255,r*br);g=Math.min(255,g*br);b=Math.min(255,b*br);
  const gray=0.299*r+0.587*g+0.114*b;
  const s=sat/100;
  return[
    Math.min(255,Math.max(0,gray+(r-gray)*s)),
    Math.min(255,Math.max(0,gray+(g-gray)*s)),
    Math.min(255,Math.max(0,gray+(b-gray)*s))
  ];
}

function convert(){
  if(!origImg)return;
  const res=parseInt(document.getElementById('res-select').value);
  const bri=parseInt(document.getElementById('brightness').value);
  const sat=parseInt(document.getElementById('saturation').value);
  const mergeThresh=parseInt(document.getElementById('merge-thresh').value);

  // 1. 리사이즈
  const tmp=document.createElement('canvas');
  tmp.width=tmp.height=res;
  const tctx=tmp.getContext('2d');
  tctx.drawImage(origImg,0,0,res,res);
  const imgData=tctx.getImageData(0,0,res,res);

  // 2. 초기 매핑
  const grid=[];
  for(let y=0;y<res;y++){
    const row=[];
    for(let x=0;x<res;x++){
      const i=(y*res+x)*4;
      let[r,g,b]=adjustPixel(imgData.data[i],imgData.data[i+1],imgData.data[i+2],bri,sat);
      let label=nearestLabel(r,g,b);
      label=REMAP[label]||label;
      if(label==='1'&&r>210&&g>200&&r>b+20)label='226';
      row.push(label);
    }
    grid.push(row);
  }

  // 3. 소량 통합
  const counter={};
  for(const row of grid)for(const l of row)counter[l]=(counter[l]||0)+1;
  const major=Object.keys(counter).filter(l=>counter[l]>mergeThresh);

  function closestMajor(label){
    const[r,g,b]=hexToRgb(PALETTE[label]?.hex||'#888');
    let best=major[0],bestD=1e18;
    for(const m of major){
      const[pr,pg,pb]=hexToRgb(PALETTE[m]?.hex||'#888');
      const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
      if(d<bestD){bestD=d;best=m;}
    }
    return best;
  }

  const minorMap={};
  for(const l of Object.keys(counter)){
    if(counter[l]<=mergeThresh)minorMap[l]=closestMajor(l);
  }

  for(let y=0;y<res;y++)
    for(let x=0;x<res;x++)
      if(minorMap[grid[y][x]])grid[y][x]=minorMap[grid[y][x]];

  // 4. 체커보드 배경
  for(let y=0;y<res;y++)
    for(let x=0;x<res;x++)
      if(grid[y][x]==='1'||grid[y][x]==='226')
        grid[y][x]=(x+y)%2===0?'1':'226';

  lastGrid=grid;

  // 5. 렌더
  renderPixelCanvas(grid,res);
  renderManualCanvas(grid,res);
  renderOrigCanvas();
  renderPurchase(grid,res);

  document.getElementById('empty-panel').style.display='none';
  document.getElementById('result-panel').style.display='block';
  activateTab('pixel');
}

// ── Render ──
function renderPixelCanvas(grid,res){
  const cell=Math.max(8,Math.floor(Math.min(560,window.innerWidth-80)/res));
  const pc=document.getElementById('pixel-canvas');
  pc.width=pc.height=cell*res;
  const ctx=pc.getContext('2d');
  for(let y=0;y<res;y++){
    for(let x=0;x<res;x++){
      const hex=PALETTE[grid[y][x]]?.hex||'#888';
      const[r,g,b]=hexToRgb(hex);
      const px=x*cell,py=y*cell;
      ctx.fillStyle=hex;ctx.fillRect(px,py,cell,cell);
      ctx.fillStyle='rgba(0,0,0,0.22)';
      ctx.fillRect(px,py+cell-Math.max(1,cell/8),cell,Math.max(1,cell/8));
      ctx.fillRect(px+cell-Math.max(1,cell/8),py,Math.max(1,cell/8),cell);
      if(cell>=10){
        const sr=Math.floor(cell*0.3);
        const cx=px+cell/2,cy=py+cell/2;
        ctx.fillStyle=`rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`;
        ctx.beginPath();ctx.arc(cx,cy,sr,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.2)';
        ctx.beginPath();ctx.arc(cx,cy+1,sr-1,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,255,255,0.3)`;
        ctx.beginPath();ctx.arc(cx-sr*0.3,cy-sr*0.3,sr*0.35,0,Math.PI*2);ctx.fill();
      }
    }
  }
}

function renderManualCanvas(grid,res){
  const cell=Math.max(8,Math.floor(Math.min(560,window.innerWidth-80)/res));
  const mc=document.getElementById('manual-canvas');
  mc.width=mc.height=cell*res;
  const ctx=mc.getContext('2d');
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,mc.width,mc.height);
  const fs=Math.max(5,Math.floor(cell*0.36));
  ctx.font=`bold ${fs}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let y=0;y<res;y++){
    for(let x=0;x<res;x++){
      const label=grid[y][x];
      const hex=PALETTE[label]?.hex||'#888';
      const px=x*cell,py=y*cell;
      ctx.fillStyle=hex;ctx.fillRect(px,py,cell,cell);
      ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;
      ctx.strokeRect(px+0.5,py+0.5,cell-1,cell-1);
      if(cell>=14){
        const br=brightness(hex);
        ctx.fillStyle=br>130?'#111':'#eee';
        ctx.fillText(label,px+cell/2,py+cell/2);
      }
    }
  }
}

function renderOrigCanvas(){
  if(!origImg)return;
  const oc=document.getElementById('orig-canvas');
  const size=Math.max(8,Math.floor(Math.min(560,window.innerWidth-80)));
  oc.width=oc.height=size;
  const ctx=oc.getContext('2d');
  const s=Math.min(size/origImg.width,size/origImg.height);
  const w=Math.round(origImg.width*s),h=Math.round(origImg.height*s);
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,size,size);
  ctx.drawImage(origImg,(size-w)/2,(size-h)/2,w,h);
}

function renderPurchase(grid,res){
  const counter={};
  for(const row of grid)for(const l of row)counter[l]=(counter[l]||0)+1;
  const total=res*res;

  const swatchesEl=document.getElementById('swatches');
  swatchesEl.innerHTML='';
  const tbody=document.getElementById('purchase-body');
  tbody.innerHTML='';

  let totalBuy=0;
  const entries=Object.entries(counter).sort((a,b)=>b[1]-a[1]);

  for(const[label,count]of entries){
    const{hex,warm}=PALETTE[label]||{hex:'#888',warm:false};
    const sw=document.createElement('div');
    sw.className='swatch';sw.style.background=hex;
    sw.innerHTML=`<div class="swatch-tip">${label} · ${count}개</div>`;
    swatchesEl.appendChild(sw);

    const{buy,combo}=bestPurchase(count);
    totalBuy+=buy;
    const[a200,a330,a660]=combo;
    const parts=[];
    if(a660)parts.push(`<span class="tag tag-660">660×${a660}</span>`);
    if(a330)parts.push(`<span class="tag tag-330">330×${a330}</span>`);
    if(a200)parts.push(`<span class="tag tag-200">200×${a200}</span>`);

    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div style="width:18px;height:18px;border-radius:3px;background:${hex};border:1px solid rgba(0,0,0,0.12);"></div></td>
      <td style="font-weight:500;color:#111;">${label}</td>
      <td><span class="badge ${warm?'badge-warm':'badge-neutral'}">${warm?'따뜻':'무채색'}</span></td>
      <td class="num">${count}</td>
      <td>${parts.join(' ')}</td>
      <td class="num" style="font-weight:500;color:#111;">${buy}</td>
      <td class="num w">${buy-count}</td>
    `;
    tbody.appendChild(tr);
  }

  const waste=totalBuy-total;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-v">${Object.keys(counter).length}</div><div class="stat-l">색상 수</div></div>
    <div class="stat"><div class="stat-v">${total.toLocaleString()}</div><div class="stat-l">필요 블럭</div></div>
    <div class="stat"><div class="stat-v">${totalBuy.toLocaleString()}</div><div class="stat-l">구매 블럭</div></div>
    <div class="stat"><div class="stat-v">${Math.round(waste/totalBuy*100)}%</div><div class="stat-l">낭비율</div></div>
  `;
}

// ── Tabs ──
function activateTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const pc=document.getElementById('pixel-canvas');
  const mc=document.getElementById('manual-canvas');
  const oc=document.getElementById('orig-canvas');
  pc.style.display=tab==='pixel'?'block':'none';
  mc.style.display=tab==='manual'?'block':'none';
  oc.style.display=tab==='orig'?'block':'none';
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>activateTab(t.dataset.tab));

// ── Download ──
document.getElementById('dl-pixel-btn').onclick=()=>dlCanvas('pixel-canvas','lego_pixel_art.png');
document.getElementById('dl-manual-btn').onclick=()=>dlCanvas('manual-canvas','lego_manual.png');
function dlCanvas(id,filename){
  const a=document.createElement('a');
  a.href=document.getElementById(id).toDataURL('image/png');
  a.download=filename;a.click();
}
</script>
</body>
