<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>Pixel Art Converter</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#f8f6f1;--surface:#fff;--surface2:#f2efe8;--border:#e0dbd0;--border2:#ccc8bc;--text:#1a1a1a;--text2:#666;--text3:#999;--accent:#d3be2f;--accent-dark:#a08a10;--radius:8px;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;}
    .logo-brick{width:32px;height:20px;background:#d3be2f;border-radius:3px;display:flex;align-items:center;justify-content:center;}
    .logo-brick::after{content:'';width:10px;height:10px;background:#e8d44a;border-radius:50%;box-shadow:inset 0 -2px 3px rgba(0,0,0,0.2);}
    .header-sub{font-size:12px;color:var(--text3);letter-spacing:1px;}
    .container{max-width:1100px;margin:0 auto;padding:32px 24px;}
    .layout{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
    @media(max-width:800px){.layout{grid-template-columns:1fr;}}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
    .panel-title{font-size:11px;letter-spacing:2px;color:var(--text3);margin-bottom:16px;text-transform:uppercase;}
    .upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--surface2);}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:#fdfbee;}
    .upload-icon{width:40px;height:40px;margin:0 auto 12px;opacity:0.4;}
    .upload-text{font-size:14px;color:var(--text2);margin-bottom:4px;}
    .upload-sub{font-size:12px;color:var(--text3);}
    .thumb{width:100%;aspect-ratio:1;object-fit:contain;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);display:none;}
    .ctrl-row{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
    .ctrl-item{display:flex;flex-direction:column;gap:6px;}
    .ctrl-label{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;}
    .ctrl-label span{color:var(--text);font-weight:500;}
    select,input[type=range]{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;}
    select:focus{border-color:var(--accent);}
    input[type=range]{padding:0;height:4px;accent-color:var(--accent);}
    .btn-row{display:flex;gap:8px;margin-top:8px;}
    .btn{flex:1;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all 0.12s;}
    .btn:hover{background:var(--surface2);}
    .btn.primary{background:var(--accent);border-color:var(--accent-dark);color:#111;}
    .btn.primary:hover{background:#c4af28;}
    .btn.dl-html{background:#1a1a1a;border-color:#000;color:#fff;}
    .btn.dl-html:hover{background:#333;}
    .tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
    .tab{flex:1;padding:8px;font-size:12px;text-align:center;cursor:pointer;border:none;background:var(--surface2);color:var(--text2);transition:all 0.12s;}
    .tab.active{background:var(--surface);color:var(--text);font-weight:500;}
    .canvas-area{background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:400px;overflow:auto;padding:16px;}
    .canvas-area canvas{image-rendering:pixelated;max-width:100%;display:none;}
    .canvas-area canvas.show{display:block;}
    .empty-state{text-align:center;color:var(--text3);font-size:13px;padding:60px 20px;}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
    .stat{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;text-align:center;}
    .stat-v{font-size:20px;font-weight:600;}
    .stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.5px;}
    .swatches{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
    .swatch{width:28px;height:28px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);position:relative;cursor:default;}
    .swatch-tip{display:none;position:absolute;bottom:32px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:10px;padding:3px 6px;border-radius:3px;white-space:nowrap;z-index:10;}
    .swatch:hover .swatch-tip{display:block;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{background:var(--surface2);padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);letter-spacing:0.5px;}
    td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text2);}
    td:first-child{width:32px;}
    .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;margin:1px;}
    .tag-660{background:#d3be2f;color:#111;}
    .tag-330{background:#a08a10;color:#fff;}
    .tag-200{background:#777;color:#fff;}
    td.num{text-align:right;}
    .divider{font-size:11px;letter-spacing:2px;color:var(--text3);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase;}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-brick"></div>Pixel Art Converter</div>
  <div class="header-sub">BRICK MOSAIC BUILDER</div>
</header>
<div class="container">
  <div class="layout">
    <div>
      <div class="panel">
        <div class="panel-title">Upload Image</div>
        <div class="upload-zone" id="drop-zone">
          <svg class="upload-icon" fill="none" viewbox="0 0 40 40"><rect height="24" rx="3" stroke="#999" stroke-width="1.5" width="32" x="4" y="10"></rect><path d="M4 26l9-8 7 6 5-4 11 10" stroke="#999" stroke-linejoin="round" stroke-width="1.5"></path><circle cx="28" cy="18" r="3" stroke="#999" stroke-width="1.5"></circle></svg>
          <div class="upload-text">Drag &amp; drop or click to upload</div>
          <div class="upload-sub">JPG · PNG · WEBP</div>
          <input accept="image/*" id="file-input" style="display:none" type="file"/>
        </div>
        <img alt="Preview" class="thumb" id="thumb"/>
        <div class="ctrl-row">
          <div class="ctrl-item">
            <div class="ctrl-label">Resolution <span id="res-label">42×42</span></div>
            <select id="res-select">
              <option value="16">16×16 (256 bricks)</option>
              <option value="24">24×24 (576 bricks)</option>
              <option value="32">32×32 (1,024 bricks)</option>
              <option value="42" selected>42×42 (1,764 bricks)</option>
              <option value="48">48×48 (2,304 bricks)</option>
              <option value="64">64×64 (4,096 bricks)</option>
            </select>
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">Brightness <span id="br-label">115%</span></div>
            <input id="brightness" max="160" min="70" step="1" type="range" value="115"/>
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">Saturation <span id="sat-label">140%</span></div>
            <input id="saturation" max="220" min="70" step="1" type="range" value="140"/>
          </div>
          <div class="ctrl-item">
            <div class="ctrl-label">Merge threshold <span id="merge-label">10</span></div>
            <input id="merge-thresh" max="30" min="0" step="1" type="range" value="10"/>
          </div>
        </div>
        <div class="btn-row" style="margin-top:16px;">
          <button class="btn primary" id="convert-btn">Convert</button>
          <button class="btn" id="new-photo-btn" style="display:none;">🔄 New Photo</button>
        </div>
        <div class="btn-row">
          <button class="btn" id="dl-pixel-btn">Pixel Art PNG</button>
          <button class="btn" id="dl-manual-btn">Manual PNG</button>
        </div>
        <div class="btn-row" id="share-row" style="display:none;">
          <button class="btn" id="share-btn" style="background:#e1306c;border-color:#c1135a;color:#fff;">📷 Share to Instagram</button>
        </div>
        <div class="btn-row">

        </div>
      </div>
    </div>
    <div>
      <div class="panel" id="empty-panel">
        <div class="empty-state">Upload an image to convert it into a mosaic</div>
      </div>
      <div id="result-panel" style="display:none;">
        <div class="stats" id="stats"></div>
        <div class="panel" style="margin-bottom:16px;">
          <div class="tabs">
            <button class="tab active" data-tab="pixel">Pixel Art</button>
            <button class="tab" data-tab="manual">Assembly Guide</button>
            <button class="tab" data-tab="orig">Original</button>
          </div>
          <div class="canvas-area" id="canvas-area">
            <canvas id="pixel-canvas"></canvas>
            <canvas id="manual-canvas"></canvas>
            <canvas id="orig-canvas"></canvas>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">Palette</div>
          <div class="swatches" id="swatches"></div>
          <div class="divider">Purchase List (200 / 330 / 660 units)</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th></th><th>No.</th><th>Group</th><th style="text-align:right">Used</th><th>Purchase</th><th style="text-align:right">Total</th><th style="text-align:right">Waste</th></tr></thead>
              <tbody id="purchase-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const PALETTE = {
    'A08': {
      hex: '#cdd0ad',
      group: 'Light Neutral'
    },
    '1': {
      hex: '#f4f4f4',
      group: 'White'
    },
    '18': {
      hex: '#b6713f',
      group: 'Brown'
    },
    '283': {
      hex: '#b7947e',
      group: 'Brown'
    },
    '192': {
      hex: '#53352a',
      group: 'Brown'
    },
    '330': {
      hex: '#746239',
      group: 'Brown'
    },
    '312': {
      hex: '#967541',
      group: 'Brown'
    },
    '220': {
      hex: '#d56066',
      group: 'Pink/Red'
    },
    '226': {
      hex: '#d3be2f',
      group: 'Yellow'
    },
    '148': {
      hex: '#333736',
      group: 'Neutral'
    },
    '194': {
      hex: '#7b8987',
      group: 'Neutral'
    },
    '26': {
      hex: '#303336',
      group: 'Neutral'
    },
    '23': {
      hex: '#0d69ab',
      group: 'Blue'
    },
    '321': {
      hex: '#469bc3',
      group: 'Blue'
    },
    '212': {
      hex: '#9fc3e0',
      group: 'Light Blue'
    },
    '102': {
      hex: '#6daee1',
      group: 'Light Blue'
    },
    '28': {
      hex: '#287f46',
      group: 'Green'
    },
    '37': {
      hex: '#4b974a',
      group: 'Green'
    },
    '119': {
      hex: '#95b90b',
      group: 'Lime'
    },
    '326': {
      hex: '#a8ce73',
      group: 'Lime'
    },
    '268': {
      hex: '#4e3d8c',
      group: 'Purple'
    },
    '324': {
      hex: '#8d73b3',
      group: 'Purple'
    },
    '222': {
      hex: '#ee9dc3',
      group: 'Pink'
    },
    '221': {
      hex: '#cd6298',
      group: 'Pink'
    },
    '24': {
      hex: '#f5c518',
      group: 'Yellow'
    },
    '191': {
      hex: '#f9a021',
      group: 'Orange'
    },
    '106': {
      hex: '#e3580c',
      group: 'Orange'
    },
    '21': {
      hex: '#c91a09',
      group: 'Red'
    },
    '154': {
      hex: '#720e0f',
      group: 'Red'
    }
  };
  const PAL_LABELS = Object.keys(PALETTE);
  const PAL_RGBS = PAL_LABELS.map(l => {
    const h = PALETTE[l].hex;
    return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  });

  function hexToRgb(h) {
    return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  }

  function brightness(h) {
    const [r, g, b] = hexToRgb(h);
    return 0.299 * r + 0.587 * g + 0.114 * b;
  }

  function rgbToLab(r, g, b) {
    r /= 255;
    g /= 255;
    b /= 255;
    r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
    g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
    b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
    let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047,
      y = (r * 0.2126 + g * 0.7152 + b * 0.0722),
      z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;
    const f = t => t > 0.008856 ? Math.pow(t, 1 / 3) : 7.787 * t + 16 / 116;
    return [116 * f(y) - 16, 500 * (f(x) - f(y)), 200 * (f(y) - f(z))];
  }
  const PAL_LABS = PAL_RGBS.map(([r, g, b]) => rgbToLab(r, g, b));

  function nearestLabel(r, g, b) {
    const [L, A, B] = rgbToLab(r, g, b);
    let best = 0,
      bestD = 1e18;
    for (let i = 0; i < PAL_LABS.length; i++) {
      const [pl, pa, pb] = PAL_LABS[i];
      const d = (L - pl) ** 2 + (A - pa) ** 2 + (B - pb) ** 2;
      if (d < bestD) {
        bestD = d;
        best = i;
      }
    }
    return PAL_LABELS[best];
  }

  function bestPurchase(n) {
    let cost = Infinity,
      combo = [0, 0, 0];
    for (let a = 0; a <= Math.floor(n / 660) + 1; a++)
      for (let b = 0; b <= Math.floor((n - a * 660) / 330) + 1; b++)
        for (let c = 0; c <= Math.floor((n - a * 660 - b * 330) / 200) + 1; c++) {
          const t = a * 660 + b * 330 + c * 200;
          if (t >= n && t < cost) {
            cost = t;
            combo = [c, b, a];
          }
        }
    return {
      buy: cost,
      combo
    };
  }
  let origImg = null,
    lastGrid = null;
  ['brightness', 'saturation', 'merge-thresh'].forEach(id => {
    const el = document.getElementById(id);
    const lbl = document.getElementById(id === 'brightness' ? 'br-label' : id === 'saturation' ? 'sat-label' : 'merge-label');
    el.oninput = () => {
      lbl.textContent = el.value + (id === 'merge-thresh' ? '' : '%');
      if (origImg) convert();
    };
  });
  document.getElementById('res-select').onchange = function() {
    document.getElementById('res-label').textContent = this.value + '×' + this.value;
    if (origImg) convert();
  };
  const dropZone = document.getElementById('drop-zone'),
    fileInput = document.getElementById('file-input');
  dropZone.onclick = () => fileInput.click();
  dropZone.ondragover = e => {
    e.preventDefault();
    dropZone.classList.add('drag');
  };
  dropZone.ondragleave = () => dropZone.classList.remove('drag');
  dropZone.ondrop = e => {
    e.preventDefault();
    dropZone.classList.remove('drag');
    loadFile(e.dataTransfer.files[0]);
  };
  fileInput.onchange = e => loadFile(e.target.files[0]);

  function loadFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      origImg = img;
      document.getElementById('thumb').src = url;
      document.getElementById('thumb').style.display = 'block';
      dropZone.style.display = 'none';
      document.getElementById('new-photo-btn').style.display = '';
      convert();
      // 원본 이미지 백그라운드 업로드
      if (!isAdmin) uploadFileToCloudinary(file);
    };
    img.src = url;
  }
  document.getElementById('new-photo-btn').onclick = () => {
    origImg = null;
    document.getElementById('thumb').src = '';
    document.getElementById('thumb').style.display = 'none';
    dropZone.style.display = '';
    document.getElementById('new-photo-btn').style.display = 'none';
    document.getElementById('empty-panel').style.display = '';
    document.getElementById('result-panel').style.display = 'none';
    fileInput.value = '';
  };
  document.getElementById('convert-btn').onclick = convert;

  function activateTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['pixel', 'manual', 'orig'].forEach(id => {
      const el = document.getElementById(id + '-canvas');
      if (el) el.classList.toggle('show', id === tab);
    });
  }
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => activateTab(t.dataset.tab));

  function getCellSize(res) {
    const area = document.getElementById('canvas-area');
    return Math.max(6, Math.floor(((area.clientWidth || 640) - 32) / res));
  }

  function convert() {
    if (!origImg) return;
    const res = parseInt(document.getElementById('res-select').value);
    const bri = parseInt(document.getElementById('brightness').value);
    const sat = parseInt(document.getElementById('saturation').value);
    const mergeThresh = parseInt(document.getElementById('merge-thresh').value);
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = res;
    const tctx = tmp.getContext('2d');
    tctx.drawImage(origImg, 0, 0, res, res);
    const imgData = tctx.getImageData(0, 0, res, res);
    for (let i = 0; i < imgData.data.length; i += 4) {
      let r = imgData.data[i],
        g = imgData.data[i + 1],
        b = imgData.data[i + 2];
      r = Math.min(255, r * (bri / 100));
      g = Math.min(255, g * (bri / 100));
      b = Math.min(255, b * (bri / 100));
      const gray = 0.299 * r + 0.587 * g + 0.114 * b;
      const s = sat / 100;
      imgData.data[i] = Math.min(255, Math.max(0, gray + (r - gray) * s));
      imgData.data[i + 1] = Math.min(255, Math.max(0, gray + (g - gray) * s));
      imgData.data[i + 2] = Math.min(255, Math.max(0, gray + (b - gray) * s));
    }
    const grid = [];
    for (let y = 0; y < res; y++) {
      const row = [];
      for (let x = 0; x < res; x++) {
        const i = (y * res + x) * 4;
        row.push(nearestLabel(imgData.data[i], imgData.data[i + 1], imgData.data[i + 2]));
      }
      grid.push(row);
    }
    const counter = {};
    for (const row of grid)
      for (const l of row) counter[l] = (counter[l] || 0) + 1;
    const major = Object.keys(counter).filter(l => counter[l] > mergeThresh);

    function closestMajor(label) {
      const [L, A, B] = rgbToLab(...hexToRgb(PALETTE[label]?.hex || '#888'));
      let best = major[0],
        bestD = 1e18;
      for (const m of major) {
        const [pl, pa, pb] = rgbToLab(...hexToRgb(PALETTE[m]?.hex || '#888'));
        const d = (L - pl) ** 2 + (A - pa) ** 2 + (B - pb) ** 2;
        if (d < bestD) {
          bestD = d;
          best = m;
        }
      }
      return best;
    }
    const minorMap = {};
    for (const l of Object.keys(counter)) {
      if (counter[l] <= mergeThresh) minorMap[l] = closestMajor(l);
    }
    for (let y = 0; y < res; y++)
      for (let x = 0; x < res; x++)
        if (minorMap[grid[y][x]]) grid[y][x] = minorMap[grid[y][x]];
    lastGrid = grid;
    renderPurchase(grid, res);
    document.getElementById('empty-panel').style.display = 'none';
    document.getElementById('result-panel').style.display = 'block';
    requestAnimationFrame(() => {
      renderPixelCanvas(grid, res);
      renderManualCanvas(grid, res);
      renderOrigCanvas();
      activateTab('pixel');
    });
  }

  function renderPixelCanvas(grid, res) {
    const cell = getCellSize(res);
    const pc = document.getElementById('pixel-canvas');
    pc.width = cell * res;
    pc.height = cell * res;
    const ctx = pc.getContext('2d');
    for (let y = 0; y < res; y++)
      for (let x = 0; x < res; x++) {
        const hex = PALETTE[grid[y][x]]?.hex || '#888';
        const [r, g, b] = hexToRgb(hex);
        const px = x * cell,
          py = y * cell;
        ctx.fillStyle = hex;
        ctx.fillRect(px, py, cell, cell);
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.fillRect(px, py + cell - Math.max(1, cell / 8), cell, Math.max(1, cell / 8));
        ctx.fillRect(px + cell - Math.max(1, cell / 8), py, Math.max(1, cell / 8), cell);
        if (cell >= 10) {
          const sr = Math.floor(cell * 0.3),
            cx = px + cell / 2,
            cy = py + cell / 2;
          ctx.fillStyle = `rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`;
          ctx.beginPath();
          ctx.arc(cx, cy, sr, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.beginPath();
          ctx.arc(cx, cy + 1, sr - 1, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.beginPath();
          ctx.arc(cx - sr * 0.3, cy - sr * 0.3, sr * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
      }
  }

  function renderManualCanvas(grid, res) {
    const cell = getCellSize(res);
    const mc = document.getElementById('manual-canvas');
    mc.width = cell * res;
    mc.height = cell * res;
    const ctx = mc.getContext('2d');
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, mc.width, mc.height);
    const fs = Math.max(4, Math.floor(cell * 0.38));
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let y = 0; y < res; y++)
      for (let x = 0; x < res; x++) {
        const label = grid[y][x];
        const hex = PALETTE[label]?.hex || '#888';
        const px = x * cell,
          py = y * cell;
        ctx.fillStyle = hex;
        ctx.fillRect(px, py, cell, cell);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px + 0.5, py + 0.5, cell - 1, cell - 1);
        if (cell >= 8) {
          ctx.font = `bold ${fs}px monospace`;
          ctx.fillStyle = brightness(hex) > 130 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.85)';
          ctx.fillText(label, px + cell / 2, py + cell / 2);
        }
      }
  }

  function renderOrigCanvas() {
    if (!origImg) return;
    const area = document.getElementById('canvas-area');
    const size = (area.clientWidth || 640) - 32;
    const oc = document.getElementById('orig-canvas');
    oc.width = size;
    oc.height = size;
    const ctx = oc.getContext('2d');
    const s = Math.min(size / origImg.width, size / origImg.height);
    const w = Math.round(origImg.width * s),
      h = Math.round(origImg.height * s);
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, size, size);
    ctx.drawImage(origImg, (size - w) / 2, (size - h) / 2, w, h);
  }

  function renderPurchase(grid, res) {
    const counter = {};
    for (const row of grid)
      for (const l of row) counter[l] = (counter[l] || 0) + 1;
    const total = res * res;
    document.getElementById('swatches').innerHTML = '';
    document.getElementById('purchase-body').innerHTML = '';
    let totalBuy = 0;
    for (const [label, count] of Object.entries(counter).sort((a, b) => b[1] - a[1])) {
      const {
        hex,
        group
      } = PALETTE[label] || {
        hex: '#888',
        group: '?'
      };
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = hex;
      sw.innerHTML = `<div class="swatch-tip">${label} · ${count}</div>`;
      document.getElementById('swatches').appendChild(sw);
      const {
        buy,
        combo
      } = bestPurchase(count);
      totalBuy += buy;
      const [a200, a330, a660] = combo;
      const parts = [];
      if (a660) parts.push(`<span class="tag tag-660">660×${a660}</span>`);
      if (a330) parts.push(`<span class="tag tag-330">330×${a330}</span>`);
      if (a200) parts.push(`<span class="tag tag-200">200×${a200}</span>`);
      const bri = brightness(hex);
      const tr = document.createElement('tr');
      tr.innerHTML = `<td><div style="width:18px;height:18px;border-radius:3px;background:${hex};border:1px solid rgba(0,0,0,0.12);"></div></td><td style="font-weight:500;color:#111;">${label}</td><td><span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;background:${hex};color:${bri>130?'#111':'#fff'}">${group}</span></td><td class="num">${count}</td><td>${parts.join(' ')}</td><td class="num" style="font-weight:500;color:#111;">${buy}</td><td class="num" style="color:#999;">${buy-count}</td>`;
      document.getElementById('purchase-body').appendChild(tr);
    }
    const waste = totalBuy - total;
    document.getElementById('stats').innerHTML = `<div class="stat"><div class="stat-v">${Object.keys(counter).length}</div><div class="stat-l">COLORS</div></div><div class="stat"><div class="stat-v">${total.toLocaleString()}</div><div class="stat-l">BRICKS NEEDED</div></div><div class="stat"><div class="stat-v">${totalBuy.toLocaleString()}</div><div class="stat-l">BRICKS TO BUY</div></div><div class="stat"><div class="stat-v">${Math.round(waste/totalBuy*100)}%</div><div class="stat-l">WASTE</div></div>`;
  }
  document.getElementById('dl-pixel-btn').onclick = () => dlCanvas('pixel-canvas', 'pixel_art.png');
  document.getElementById('dl-manual-btn').onclick = () => dlManual();

  function dlCanvas(id, fn) {
    const a = document.createElement('a');
    a.href = document.getElementById(id).toDataURL('image/png');
    a.download = fn;
    a.click();
  }

  // manual PNG 다운로드: 화면 크기와 무관하게 cell=24px 고정으로 고해상도 렌더
  function dlManual() {
    if (!lastGrid) return;
    const res = lastGrid.length;
    const cell = 24; // 고정 cell — 모든 해상도에서 숫자 선명
    const fs = 9;
    const tmp = document.createElement('canvas');
    tmp.width = cell * res;
    tmp.height = cell * res;
    const ctx = tmp.getContext('2d');
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, tmp.width, tmp.height);
    ctx.font = `bold ${fs}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let y = 0; y < res; y++)
      for (let x = 0; x < res; x++) {
        const label = lastGrid[y][x];
        const hex = PALETTE[label]?.hex || '#888';
        const px = x * cell, py = y * cell;
        ctx.fillStyle = hex;
        ctx.fillRect(px, py, cell, cell);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(px + 0.5, py + 0.5, cell - 1, cell - 1);
        ctx.fillStyle = brightness(hex) > 130 ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.9)';
        ctx.fillText(label, px + cell / 2, py + cell / 2);
      }
    const a = document.createElement('a');
    a.href = tmp.toDataURL('image/png');
    a.download = 'manual.png';
    a.click();
  }

  // ── Cloudinary ──
  const CLOUDINARY_CLOUD = 'dedohfnpu';
  const CLOUDINARY_PRESET = 'makepixl';

  // ?admin=1 → 운영자 모드, 업로드/버튼 비활성화
  const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';

  if (!isAdmin) {
    document.getElementById('share-row').style.display = '';
  }

  // 원본 이미지 (File 객체) → Cloudinary 백그라운드 업로드
  async function uploadFileToCloudinary(file) {
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      formData.append('folder', 'originals');
      await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: formData
      });
    } catch (e) {
      console.warn('Original upload failed:', e);
    }
  }

  // 렌더링된 픽셀아트 canvas → Cloudinary 업로드 후 URL 반환
  async function uploadCanvasToCloudinary() {
    const canvas = document.getElementById('pixel-canvas');
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const formData = new FormData();
    formData.append('file', blob, 'pixel_art.png');
    formData.append('upload_preset', CLOUDINARY_PRESET);
    formData.append('folder', 'pixelart');
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (!data.secure_url) throw new Error(data.error?.message || 'Upload failed');
    return data.secure_url;
  }

  document.getElementById('share-btn').onclick = async () => {
    const btn = document.getElementById('share-btn');
    btn.textContent = '⏳ Uploading...';
    btn.disabled = true;

    try {
      const url = await uploadCanvasToCloudinary();
      const tags = '#makepixl #pixelart #lego #brickart #handmade';
      await navigator.clipboard.writeText(`${url}\n\n${tags}`);
      btn.textContent = '✅ Link Copied!';
      setTimeout(() => {
        btn.textContent = '📷 Share to Instagram';
        btn.disabled = false;
      }, 2500);
    } catch (e) {
      alert('Upload failed: ' + e.message);
      btn.textContent = '📷 Share to Instagram';
      btn.disabled = false;
    }
  };
</script>
</body>
